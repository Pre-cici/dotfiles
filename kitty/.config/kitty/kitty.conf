################################### GENERAL ####################################
allow_remote_control   yes
file_transfer_confirmation_bypass
copy_on_select         yes
click_interval        -1.0
window_alert_on_bell   yes
enable_audio_bell      no

##################################### FONT #####################################
font_family          family="Maple Mono NF CN" features="+calt cv01=1 cv03=1 cv61=1"
bold_font            family="Maple Mono NF CN" style="Bold" features="+calt cv01=1 cv03=1 cv61=1" 
italic_font          family="Maple Mono NF CN" style="Italic" features="+calt cv01=1 cv03=1 cv61=1"
bold_italic_font     family="Maple Mono NF CN" style="Bold Italic" features="+calt cv01=1 cv03=1 cv61=1"

font_size            16.0

symbol_map           U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E0A3,U+E0B0-U+E0D4,U+E200-U+E3E3,U+E5FA-U+E7C5,U+EA60-U+EDFF,U+F000-U+F8FF,U+F0001-U+F1AF0,U+F1000-U+F1FFF,U+F4000-U+FFFFD,U+100000-U+10FFFD Maple Mono NF CN
symbol_map           U+E2BB,U+EA76,U+E60A,U+F0295,U+F002B,U+F03FF Maple Mono NF CN
symbol_map           U+4E00-U+9FFF,U+3400-U+4DBF Maple Mono NF CN

adjust_line_height   100%
adjust_column_width  100%

disable_ligatures    cursor

#################################### WINDOW ####################################
initial_window_width           110c
initial_window_height          31c
hide_window_decorations        titlebar-only
background_opacity             1.0
background_blur                10
window_padding_width           0
placement_strategy             center
window_logo_scale              5
window_logo_alpha              0.25
window_logo_position           top-right
remeber_windows_size           yes

#################################### CURSOR ####################################
cursor_shape block
cursor_trail 20
cursor_trail_start_threshold 10
cursor_trail_decay 0.0 0.3
cursor_blink_interval 0
detect_urls no
mouse_hide_wait 0.5
allow_remote_control yes

##################################### TAB ######################################
tab_bar_edge                top
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_max_length        10
tab_title_template          "{title}{sup.index}"
################################### KEYBINDINGS ################################
include mappings.conf

#################################### HIGHLIGHT #################################
mark1_foreground #74c7ec
mark1_background #1E1E2E
mark2_foreground #F9E2AF
mark2_background #1E1E2E
mark3_foreground #F38BA8
mark3_background #1E1E2E
toggle_marker regex 1 \\bINFO\\b 2 \\bWARNING\\b 3 \\bERROR\\b 3 \\bFATAL\\b
map ctrl+shift+m toggle_marker regex 1 \\bINFO\\b 2 \\bWARNING\\b 3 \\bERROR\\b 3 \\bFATAL\\b

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
