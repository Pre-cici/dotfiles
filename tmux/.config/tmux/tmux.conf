####################### PLUGINS ###############################
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'

####################### OPTIONS ###############################
set -sg escape-time 10

# Terminal / color
set -g default-terminal "xterm-kitty"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g default-shell /usr/bin/zsh

set -gq allow-passthrough on
set -g visual-activity off
set -g focus-events on

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g set-clipboard on

set -g xterm-keys on
set -g extended-keys on

# don't rename windows automatically
set -g allow-rename off

####################### THEME #################################
# ===== Catppuccin Macchiato palette =====
# background:    #24273A
# foreground:    #CAD3F5
# black:         #494D64
# brightBlack:   #5B6078
# red:           #ED8796
# green:         #A6DA95
# yellow:        #EED49F
# blue:          #8AADF4
# purple:        #F5BDE6
# cyan:          #8BD5CA
# white:         #B8C0E0
# brightWhite:   #A5ADCB

set -g status-position top
set -g status-justify absolute-centre
set -g status-left-length 50
set -g status-right-length 60
set -g status-style bg=default,fg=default

# Left: session + current pane command
set -g status-left "#{?client_prefix,#[fg=#ED8796]  #[bold]#S,#[fg=#A6DA95]  #[bold]#S} #[fg=#6C7086]⟩ #[fg=#EED49F]󰉖 #{b:pane_current_path} #[fg=#6C7086]⟩ #[fg=#CAD3F5] #{window_panes}#{?window_zoomed_flag, #[fg=#6C7086]⟩ #[fg=#F5BDE6]󰊓 Zoom,}"

# Right: date + time + hostname
set -g status-right "#{cpu_fg_color} #{cpu_percentage} #[fg=#5B6078]⟨ #[fg=#F4DBD6,bold]󰥔 %H:%M #[fg=#5B6078]⟨ #[fg=#8AADF4,bold]󰒋 #H "

# Copy mode
set -g copy-mode-match-style 'fg=#1E1E2E,bg=#CDD6F4'
set -g copy-mode-current-match-style 'fg=#1E1E2E,bg=#ED8796'

# Pane borders
set -g pane-border-style 'fg=#45475A'
set -g pane-active-border-style 'fg=#F9E2AF'

# Window list in center
set -g window-status-separator "  "

set -g window-status-format "#[fg=#6C7086]#{window_index} #[fg=#A6ADC8]#{window_name}"
set -g window-status-current-format "#[fg=#F9E2AF,bold]#{window_index} #[fg=#F5E0DC,bold]#{window_name}"

####################### KEYMAPS ###############################
unbind-key C-b
set -g prefix C-a

# Reload config
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Config Reloaded."

# New window
bind-key Enter new-window

# vim-tmux-navigator
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""

# Split panes using \ and -
unbind-key '"'
unbind-key %

bind-key \\ split-window -h -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'

bind-key o rotate-window
bind-key q kill-pane

# Rename
unbind-key $
unbind-key ,
bind-key n command-prompt -I "#S" "rename-session '%%'"
bind-key w command-prompt -I "#W" "rename-window '%%'"

# Smart split based on pane shape
bind-key i run-shell " \
if [ $(( \$(tmux display -p '8*#{pane_width}-20*#{pane_height}') )) -lt 0 ]; then \
  tmux split-window -v -c '#{pane_current_path}'; \
else \
  tmux split-window -h -c '#{pane_current_path}'; \
fi"

# Resize panes
bind-key -n S-Up    resize-pane -U 5
bind-key -n S-Down  resize-pane -D 5
bind-key -n S-Left  resize-pane -L 5
bind-key -n S-Right resize-pane -R 5

# Move windows
bind-key -n M-S-Left  swap-window -t -1 \; select-window -t -1
bind-key -n M-S-Right swap-window -t +1 \; select-window -t +1

####################### COPY MODE #############################
set-window-option -g mode-keys vi

bind-key c copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send-keys -X begin-selection
bind-key -T copy-mode-vi C-u send-keys -X halfpage-up
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down
bind-key -T copy-mode-vi Escape send-keys -X cancel

####################### INITIALIZE ############################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run ~/.local/share/tmux/plugins/tpm/tpm
