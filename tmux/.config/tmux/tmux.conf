####################### PLUGINS ###############################
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# 必须尽量放在插件列表最后
set -g @plugin 'tmux-plugins/tmux-continuum'

# 每 15 分钟自动保存
set -g @continuum-save-interval '15'

# 可选：开机自动启动 tmux
# set -g @continuum-boot 'on'

####################### OPTIONS ###############################

# Reduce Escape delay, useful for Vim/Neovim
set -sg escape-time 10

# tmux virtual terminal presented to programs inside panes
set -g default-terminal "tmux-256color"

# Capabilities provided by the outer Kitty terminal
set -as terminal-features ",xterm-kitty:RGB"
set -as terminal-features ",xterm-kitty:extkeys"

# Required by terminal image protocols such as Yazi/image.nvim
set -gq allow-passthrough on

# Focus notifications for Neovim and other TUI applications
set -g focus-events on

# Keep information about the outer terminal program
set -ga update-environment TERM_PROGRAM

# Start window and pane numbering from 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Mouse and clipboard integration
set -g mouse on
set -g set-clipboard on

# Extended modified-key support
set -s extended-keys on

# Preserve manually assigned window names
set -g allow-rename off
set -g automatic-rename off

####################### THEME #################################
# background:    #24273A
# foreground:    #CAD3F5
# black:         #494D64
# brightBlack:   #5B6078
# red:           #ED8796
# green:         #A6DA95
# yellow:        #EED49F
# blue:          #8AADF4
# purple:        #F5BDE6
# cyan:          #8BD5CA
# white:         #B8C0E0
# brightWhite:   #A5ADCB

set -g status-position top
set -g status-justify absolute-centre
set -g status-left-length 50
set -g status-right-length 60
set -g status-style bg=default,fg=default

# Left: session + current dir + numbers of pane
set -g status-left "#{?client_prefix,#[fg=#ED8796]  #[bold]#S,#[fg=#A6DA95]  #[bold]#S} #[fg=#6C7086]⟩ \
#[fg=#F9E2AF]󰉖 #{b:pane_current_path} #[fg=#6C7086]⟩ \
#[fg=#CAD3F5] #{window_panes}#{?window_zoomed_flag, #[fg=#6C7086]⟩ #[fg=#F5BDE6]󰊓 Zoom,}"

# Right: cpu + time + hostname
set -g status-right "#{cpu_fg_color} #{cpu_percentage} #[fg=#6C7086]⟨ \
#[fg=#F4DBD6,bold]󰥔 %H:%M #[fg=#6C7086]⟨ \
#[fg=#8AADF4,bold]󰒋 #H "

# Pane borders
set -g pane-border-style 'fg=#6C7086'
set -g pane-active-border-style 'fg=#F9E2AF'


# Window list in center
set -g window-status-separator "  "
set -g window-status-format "#[fg=#6C7086]#{window_index} #[fg=#A6ADC8]#{window_name}"
set -g window-status-current-format "#[fg=#F9E2AF,bold]#{window_index} #[fg=#F4DBD6,bold]#{window_name}"

####################### KEYMAPS ###############################
unbind-key C-b
set -g prefix C-a

# Send prefix to application or nested tmux
bind-key C-a send-prefix

# Reload config
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded."

# New window, inheriting current pane directory
bind-key Enter new-window -c '#{pane_current_path}'

# vim-tmux-navigator
set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""

# Split panes, inheriting current pane directory
unbind-key '"'
unbind-key %

bind-key \\ split-window -h -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'

# Pane operations
bind-key o rotate-window
bind-key q kill-pane

# Rename
unbind-key $
unbind-key ,
bind-key n command-prompt -I "#S" "rename-session '%%'"
bind-key w command-prompt -I "#W" "rename-window '%%'"


# Smart split based on pane shape
bind-key i run-shell " \
if [ $(( \$(tmux display -p '8*#{pane_width}-20*#{pane_height}') )) -lt 0 ]; then \
  tmux split-window -v -c '#{pane_current_path}'; \
else \
  tmux split-window -h -c '#{pane_current_path}'; \
fi"

# Create or switch to a session
bind-key C command-prompt -p "Session name:" "new-session -A -s '%%' -c '#{pane_current_path}'"

# Move current pane into a newly created session
bind-key P command-prompt -p "New session name:" "new-session -d -s '%%' -n '__tmp__' \; break-pane -d -s '#{pane_id}' -t '%%:' \; kill-window -t '%%:__tmp__' \; switch-client -t '%%'"

# Move current window into a newly created session
bind-key W command-prompt -p "New session name:" "new-session -d -s '%%' -n '__tmp__' \; move-window -s '#{window_id}' -t '%%:' \; kill-window -t '%%:__tmp__' \; switch-client -t '%%'"


# Move current window
bind-key -r < swap-window -t -1 \; select-window -t -1
bind-key -r > swap-window -t +1 \; select-window -t +1


####################### LAYOUTS ###############################

# Cycle built-in layouts
bind-key Space next-layout

# Save the current window layout
bind-key S set-option -wF @saved-layout '#{window_layout}' \; display-message 'Layout saved for window: #W'

# Restore the saved layout
bind-key R run-shell 'layout=#{q:@saved-layout}; if [ -z "$layout" ]; then tmux display-message "No saved layout for this window"; elif ! tmux select-layout -t "#{window_id}" "$layout"; then tmux display-message "Layout restore failed: pane count may have changed"; fi'

####################### COPY MODE #############################
set-window-option -g mode-keys vi

set -g mode-style 'fg=#CAD3F5,bg=#363A4F'
set -g copy-mode-match-style 'fg=#EED49F,bg=default,underscore'
set -g copy-mode-current-match-style 'fg=#ED8796,bg=default,bold,underscore'

bind-key c copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send-keys -X begin-selection
bind-key -T copy-mode-vi C-u send-keys -X halfpage-up
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down
bind-key -T copy-mode-vi Escape send-keys -X cancel

####################### INITIALIZE ############################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run ~/.local/share/tmux/plugins/tpm/tpm
